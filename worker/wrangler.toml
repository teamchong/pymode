name = "pymode"
main = "src/worker.ts"
compatibility_date = "2024-04-03"

[limits]
cpu_ms = 30000

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]

[[rules]]
type = "Data"
globs = ["**/*.zip"]

# Persistent /data directory backed by KV
# Create with: wrangler kv namespace create PYMODE_DATA
# Then update the id below with the actual namespace ID
# [[kv_namespaces]]
# binding = "PYMODE_DATA"
# id = "YOUR_KV_NAMESPACE_ID"

# Durable Objects:
# - TcpPoolDO: Legacy persistent TCP connections (trampoline mode)
# - PythonDO: Full CPython WASM instance with host imports (new architecture)
# - ThreadDO: Child DOs for parallel Python execution (spawned by PythonDO)
[durable_objects]
bindings = [
  { name = "TCP_POOL", class_name = "TcpPoolDO" },
  { name = "PYTHON_DO", class_name = "PythonDO" },
  { name = "THREAD_DO", class_name = "ThreadDO" },
]

[[migrations]]
tag = "v1"
new_classes = ["TcpPoolDO"]

[[migrations]]
tag = "v2"
new_classes = ["PythonDO"]

[[migrations]]
tag = "v3"
new_classes = ["ThreadDO"]
