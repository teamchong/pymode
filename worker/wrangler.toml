name = "pymode"
main = "src/worker.ts"
compatibility_date = "2024-04-03"

[limits]
cpu_ms = 30000

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]

[[rules]]
type = "Data"
globs = ["**/*.zip"]

# Persistent /data directory backed by KV
# Create with: wrangler kv namespace create PYMODE_DATA
# Then update the id below with the actual namespace ID
# [[kv_namespaces]]
# binding = "PYMODE_DATA"
# id = "YOUR_KV_NAMESPACE_ID"

# Durable Object for persistent TCP connections (database drivers, etc.)
# Connections survive across trampoline rounds — no conversation replay needed.
[durable_objects]
bindings = [
  { name = "TCP_POOL", class_name = "TcpPoolDO" },
]

[[migrations]]
tag = "v1"
new_classes = ["TcpPoolDO"]
