name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential lld
          pip3 install cython typing_extensions

      - name: Install Rust (for pydantic-core)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Install binaryen (wasm-opt)
        run: |
          BINARYEN_VERSION=122
          curl -L "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz" | tar xz
          sudo mv binaryen-version_${BINARYEN_VERSION}/bin/* /usr/local/bin/

      - name: Cache CPython source
        uses: actions/cache@v4
        with:
          path: cpython
          key: cpython-3.13.0-source

      - name: Clone CPython
        run: |
          if [ ! -d cpython ]; then
            git clone --depth 1 --branch v3.13.0 https://github.com/python/cpython.git cpython
          fi

      - name: Cache native Python build
        uses: actions/cache@v4
        with:
          path: build/native/
          key: native-python-3.13.0-${{ runner.os }}

      - name: Cache WASM build tree
        uses: actions/cache@v4
        with:
          path: |
            build/zig-wasi/
            build/zig-wrappers/
          key: wasm-build-${{ hashFiles('scripts/build-phase2.sh', 'scripts/build-phase2.ts', 'scripts/config.site-wasi', 'lib/wasi-shims/**', 'lib/pymode-imports/**', 'zig-modules/**', 'c-modules/**') }}

      - name: Build python.wasm
        run: |
          if [ ! -f build/zig-wasi/python.wasm ]; then
            ./scripts/build-phase2.sh
          fi
          cp build/zig-wasi/python.wasm worker/src/python.wasm

      - name: Cache numpy build
        uses: actions/cache@v4
        with:
          path: /tmp/numpy-wasm-build/
          key: numpy-wasm-${{ hashFiles('scripts/build-numpy-wasm.sh', 'recipes/numpy.json') }}

      - name: Build numpy WASM objects
        run: |
          if [ ! -d build/zig-wasi/Modules/numpy ] || [ "$(ls build/zig-wasi/Modules/numpy/*.o 2>/dev/null | wc -l)" -eq 0 ]; then
            bash scripts/build-numpy-wasm.sh
          fi

      - name: Cache pydantic-core build
        uses: actions/cache@v4
        with:
          path: build/recipes/pydantic-core/
          key: pydantic-core-wasm-${{ hashFiles('scripts/build-pydantic-core-wasm.sh', 'recipes/pydantic-core.json') }}

      - name: Build pydantic-core WASM objects
        run: |
          if [ ! -d build/recipes/pydantic-core/obj ] || [ "$(ls build/recipes/pydantic-core/obj/*.o build/recipes/pydantic-core/obj/*.a 2>/dev/null | wc -l)" -eq 0 ]; then
            bash scripts/build-pydantic-core-wasm.sh
          fi

      - name: Build variant python.wasm (pydantic-core, then try +numpy)
        run: |
          # Build pydantic-core only variant first (guaranteed to work)
          bash scripts/build-variant.sh pydantic-core
          cp worker/src/python-pydantic-core.wasm worker/src/python.wasm

          # Attempt numpy+pydantic-core variant (may fail due to incomplete numpy objects)
          if bash scripts/build-variant.sh numpy pydantic-core; then
            echo "Full variant built successfully — using numpy+pydantic-core"
            cp worker/src/python-numpy-pydantic-core.wasm worker/src/python.wasm
          else
            echo "WARNING: numpy variant link failed — using pydantic-core only"
          fi

      - name: Install npm dependencies
        run: npm install

      - name: Generate stdlib data
        run: npx tsx scripts/generate-stdlib-fs.ts

      - name: Bundle site-packages for tests
        run: |
          npx tsx scripts/bundle-packages.ts \
            jinja2 markupsafe click pyyaml beautifulsoup4 soupsieve \
            h11 attrs starlette packaging pyparsing six certifi idna \
            charset-normalizer anyio sniffio annotated-types \
            typing-extensions jsonpatch jsonpointer distro tblib httpcore \
            tenacity requests httpx urllib3 \
            xxhash regex msgpack \
            pydantic fastapi langchain-core langsmith langgraph \
            instructor openai dspy \
            orjson httptools

      - name: Run tests
        run: npm test
