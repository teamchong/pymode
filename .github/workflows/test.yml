name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          pip3 install cython

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Install binaryen (wasm-opt)
        run: |
          BINARYEN_VERSION=122
          curl -L "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz" | tar xz
          sudo mv binaryen-version_${BINARYEN_VERSION}/bin/* /usr/local/bin/

      - name: Cache CPython source
        uses: actions/cache@v4
        with:
          path: cpython
          key: cpython-3.13.0-source

      - name: Clone CPython
        run: |
          if [ ! -d cpython ]; then
            git clone --depth 1 --branch v3.13.0 https://github.com/python/cpython.git cpython
          fi

      - name: Cache native Python build
        uses: actions/cache@v4
        with:
          path: build/native/
          key: native-python-3.13.0-${{ runner.os }}

      - name: Cache WASM build tree
        uses: actions/cache@v4
        with:
          path: |
            build/zig-wasi/
            build/zig-wrappers/
          key: wasm-build-${{ hashFiles('scripts/build-phase2.sh', 'scripts/build-phase2.ts', 'scripts/config.site-wasi', 'lib/wasi-shims/**', 'lib/pymode-imports/**') }}

      - name: Build python.wasm
        run: |
          if [ ! -f build/zig-wasi/python.wasm ]; then
            ./scripts/build-phase2.sh
          fi
          cp build/zig-wasi/python.wasm worker/src/python.wasm

      - name: Cache numpy build
        uses: actions/cache@v4
        with:
          path: /tmp/numpy-wasm-build/
          key: numpy-build-${{ hashFiles('scripts/build-numpy-wasm.sh', 'recipes/numpy.json') }}

      - name: Build numpy objects
        run: |
          # Copy cached objects if available, otherwise build from source
          if [ -d /tmp/numpy-wasm-build/obj ] && [ "$(ls /tmp/numpy-wasm-build/obj/*.o 2>/dev/null | wc -l)" -gt 50 ]; then
            echo "Using cached numpy objects"
            mkdir -p build/zig-wasi/Modules/numpy
            cp /tmp/numpy-wasm-build/obj/*.o build/zig-wasi/Modules/numpy/
            # Also need numpy-site-packages.zip
            if [ -f /tmp/numpy-wasm-build/numpy-site-packages.zip ]; then
              cp /tmp/numpy-wasm-build/numpy-site-packages.zip worker/src/numpy-site-packages.zip
            fi
          else
            bash scripts/build-numpy-wasm.sh
          fi

      - name: Install npm dependencies
        run: npm install

      - name: Link python-numpy.wasm
        run: npx tsx scripts/build-variant.ts numpy || echo "numpy link failed (optional, skipping)"
        continue-on-error: true

      - name: Generate stdlib data
        run: npx tsx scripts/generate-stdlib-fs.ts

      - name: Run tests (workerd)
        run: npm test
