<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">PyMode C Extension Dynamic Loading Architecture</text>
  <text x="550" y="64" text-anchor="middle" fill="#94a3b8" font-size="13">dlopen/dlsym polyfill via WASM host imports</text>

  <!-- ==================== BUILD TIME (Left) ==================== -->
  <rect x="30" y="90" width="500" height="340" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="115" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="2">BUILD TIME</text>

  <!-- config.site-wasi -->
  <rect x="55" y="135" width="200" height="56" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="155" y="157" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">config.site-wasi</text>
  <text x="155" y="175" text-anchor="middle" fill="#64748b" font-size="9">DYNLOADFILE=dynload_pymode.o</text>

  <!-- build-phase2.sh -->
  <rect x="300" y="135" width="210" height="56" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="405" y="157" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">build-phase2.sh</text>
  <text x="405" y="175" text-anchor="middle" fill="#64748b" font-size="9">zig cc + asyncify dl_open</text>

  <!-- Arrow config -> build -->
  <line x1="255" y1="163" x2="295" y2="163" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- dynload_pymode.c -->
  <rect x="55" y="215" width="200" height="70" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="155" y="237" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">dynload_pymode.c</text>
  <text x="155" y="253" text-anchor="middle" fill="#64748b" font-size="9">lib/wasi-shims/</text>
  <text x="155" y="271" text-anchor="middle" fill="#4ade80" font-size="9">_PyImport_FindSharedFuncptr()</text>

  <!-- pymode_imports.h -->
  <rect x="300" y="215" width="210" height="70" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="405" y="237" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">pymode_imports.h</text>
  <text x="405" y="253" text-anchor="middle" fill="#64748b" font-size="9">lib/pymode-imports/</text>
  <text x="405" y="271" text-anchor="middle" fill="#4ade80" font-size="9">dl_open, dl_sym, dl_close, dl_error</text>

  <!-- Arrow dynload -> imports -->
  <line x1="255" y1="250" x2="295" y2="250" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- python.wasm output -->
  <rect x="140" y="315" width="280" height="50" rx="8" fill="#422006" stroke="#f97316" stroke-width="1.5"/>
  <text x="280" y="337" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="700">python.wasm</text>
  <text x="280" y="353" text-anchor="middle" fill="#64748b" font-size="9">CPython 3.13 + dynload_pymode.o + Asyncify</text>

  <!-- Arrows down to python.wasm -->
  <line x1="155" y1="285" x2="230" y2="312" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="405" y1="285" x2="330" y2="312" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- build-phase2 -> python.wasm -->
  <line x1="405" y1="191" x2="405" y2="210" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ==================== BUILD TIME (Right) - Extensions ==================== -->
  <rect x="570" y="90" width="500" height="340" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="115" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="2">EXTENSION BUILD</text>

  <!-- build-extension.sh -->
  <rect x="650" y="135" width="340" height="56" rx="8" fill="#3b1764" stroke="#a855f7" stroke-width="1.5"/>
  <text x="820" y="157" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">scripts/build-extension.sh</text>
  <text x="820" y="175" text-anchor="middle" fill="#64748b" font-size="9">zig cc -target wasm32-wasi --import-memory --export-dynamic</text>

  <!-- Source packages -->
  <rect x="595" y="215" width="130" height="50" rx="8" fill="#27272a" stroke="#71717a" stroke-width="1"/>
  <text x="660" y="237" text-anchor="middle" fill="#a1a1aa" font-size="10" font-weight="600">markupsafe/</text>
  <text x="660" y="253" text-anchor="middle" fill="#64748b" font-size="9">_speedups.c</text>

  <rect x="740" y="215" width="130" height="50" rx="8" fill="#27272a" stroke="#71717a" stroke-width="1"/>
  <text x="805" y="237" text-anchor="middle" fill="#a1a1aa" font-size="10" font-weight="600">simplejson/</text>
  <text x="805" y="253" text-anchor="middle" fill="#64748b" font-size="9">_speedups.c</text>

  <rect x="885" y="215" width="130" height="50" rx="8" fill="#27272a" stroke="#71717a" stroke-width="1"/>
  <text x="950" y="237" text-anchor="middle" fill="#a1a1aa" font-size="10" font-weight="600">msgpack/</text>
  <text x="950" y="253" text-anchor="middle" fill="#64748b" font-size="9">_cmsgpack.c</text>

  <!-- .wasm side modules output -->
  <rect x="595" y="295" width="130" height="44" rx="8" fill="#422006" stroke="#f97316" stroke-width="1.5"/>
  <text x="660" y="322" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">_speedups.wasm</text>

  <rect x="740" y="295" width="130" height="44" rx="8" fill="#422006" stroke="#f97316" stroke-width="1.5"/>
  <text x="805" y="322" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">_speedups.wasm</text>

  <rect x="885" y="295" width="130" height="44" rx="8" fill="#422006" stroke="#f97316" stroke-width="1.5"/>
  <text x="950" y="322" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">_cmsgpack.wasm</text>

  <!-- Arrows source -> wasm -->
  <line x1="660" y1="265" x2="660" y2="292" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="805" y1="265" x2="805" y2="292" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="950" y1="265" x2="950" y2="292" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- .pymode/extensions label -->
  <text x="820" y="365" text-anchor="middle" fill="#94a3b8" font-size="10">.pymode/extensions/</text>
  <rect x="595" y="350" width="420" height="24" rx="4" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ==================== RUNTIME ==================== -->
  <rect x="30" y="455" width="1040" height="340" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="480" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="2">RUNTIME (Cloudflare Worker)</text>

  <!-- Python code -->
  <rect x="55" y="500" width="250" height="80" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="180" y="522" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Python Code</text>
  <text x="180" y="542" text-anchor="middle" fill="#4ade80" font-size="10" font-family="monospace">from markupsafe import escape</text>
  <text x="180" y="558" text-anchor="middle" fill="#64748b" font-size="9">triggers import machinery</text>

  <!-- CPython import -->
  <rect x="55" y="600" width="250" height="65" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="622" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">CPython Import Machinery</text>
  <text x="180" y="640" text-anchor="middle" fill="#60a5fa" font-size="9" font-family="monospace">_PyImport_FindSharedFuncptr()</text>
  <text x="180" y="655" text-anchor="middle" fill="#64748b" font-size="9">in dynload_pymode.o</text>

  <!-- Arrow Python -> Import -->
  <line x1="180" y1="580" x2="180" y2="597" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WASM boundary -->
  <rect x="330" y="500" width="3" height="260" rx="1" fill="#f97316" opacity="0.6"/>
  <text x="345" y="496" fill="#f97316" font-size="10" font-weight="600">WASM Boundary</text>

  <!-- Host imports box -->
  <rect x="360" y="500" width="220" height="165" rx="8" fill="#422006" stroke="#f97316" stroke-width="1.5"/>
  <text x="470" y="522" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">WASM Host Imports</text>
  <text x="470" y="540" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="monospace">pymode.dl_open</text>
  <text x="470" y="556" text-anchor="middle" fill="#64748b" font-size="9">(async - Asyncify suspends)</text>
  <text x="470" y="578" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="monospace">pymode.dl_sym</text>
  <text x="470" y="594" text-anchor="middle" fill="#64748b" font-size="9">(sync - returns table index)</text>
  <text x="470" y="616" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="monospace">pymode.dl_close</text>
  <text x="470" y="638" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="monospace">pymode.dl_error</text>

  <!-- Arrow Import -> Host imports -->
  <line x1="305" y1="632" x2="330" y2="580" stroke="#f97316" stroke-width="1.5"/>
  <line x1="330" y1="580" x2="355" y2="580" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- PythonDO -->
  <rect x="610" y="500" width="240" height="165" rx="8" fill="#3b1764" stroke="#a855f7" stroke-width="1.5"/>
  <text x="730" y="522" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">PythonDO (JS Host)</text>
  <text x="730" y="540" text-anchor="middle" fill="#64748b" font-size="9">worker/src/python-do.ts</text>
  <text x="730" y="564" text-anchor="middle" fill="#c084fc" font-size="10" font-family="monospace">extensionModules</text>
  <text x="730" y="580" text-anchor="middle" fill="#64748b" font-size="9">Map&lt;string, WebAssembly.Module&gt;</text>
  <text x="730" y="604" text-anchor="middle" fill="#c084fc" font-size="10" font-family="monospace">WebAssembly.instantiate()</text>
  <text x="730" y="620" text-anchor="middle" fill="#64748b" font-size="9">shared memory via env.memory</text>
  <text x="730" y="644" text-anchor="middle" fill="#c084fc" font-size="10" font-family="monospace">table.grow() + table.set()</text>

  <!-- Arrow Host imports -> PythonDO -->
  <line x1="580" y1="570" x2="605" y2="570" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Side module loaded -->
  <rect x="880" y="510" width="170" height="90" rx="8" fill="#422006" stroke="#f97316" stroke-width="1.5"/>
  <text x="965" y="532" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">Side Module</text>
  <text x="965" y="550" text-anchor="middle" fill="#f97316" font-size="10" font-family="monospace">_speedups.wasm</text>
  <text x="965" y="572" text-anchor="middle" fill="#64748b" font-size="9">exports: PyInit__speedups</text>
  <text x="965" y="588" text-anchor="middle" fill="#64748b" font-size="9">imports: env.memory (shared)</text>

  <!-- Arrow PythonDO -> Side module -->
  <line x1="850" y1="555" x2="875" y2="555" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Shared Memory -->
  <rect x="360" y="690" width="690" height="50" rx="8" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="705" y="712" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="700">Shared Linear Memory (WebAssembly.Memory)</text>
  <text x="705" y="728" text-anchor="middle" fill="#64748b" font-size="9">python.wasm + all side modules read/write the same memory buffer</text>

  <!-- Arrows to shared memory -->
  <line x1="180" y1="665" x2="180" y2="715" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="180" y1="715" x2="355" y2="715" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="730" y1="665" x2="730" y2="687" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="965" y1="600" x2="965" y2="687" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Indirect Function Table -->
  <rect x="880" y="620" width="170" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="965" y="642" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">__indirect_function_table</text>
  <text x="965" y="658" text-anchor="middle" fill="#64748b" font-size="9">PyInit ptr at table[idx]</text>

  <!-- Arrow side module -> table -->
  <line x1="730" y1="650" x2="877" y2="645" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrow-blue)"/>

  <!-- Arrow table back to CPython -->
  <line x1="880" y1="650" x2="820" y2="690" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <rect x="55" y="700" width="260" height="75" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="70" y="718" fill="#94a3b8" font-size="10" font-weight="600">Legend</text>
  <rect x="70" y="726" width="12" height="8" rx="2" fill="#22c55e"/>
  <text x="88" y="734" fill="#64748b" font-size="9">C source / Python</text>
  <rect x="70" y="740" width="12" height="8" rx="2" fill="#3b82f6"/>
  <text x="88" y="748" fill="#64748b" font-size="9">Build config / CPython</text>
  <rect x="70" y="754" width="12" height="8" rx="2" fill="#f97316"/>
  <text x="88" y="762" fill="#64748b" font-size="9">WASM modules / Host boundary</text>
  <rect x="190" y="726" width="12" height="8" rx="2" fill="#a855f7"/>
  <text x="208" y="734" fill="#64748b" font-size="9">JS host (PythonDO)</text>
  <rect x="190" y="740" width="12" height="8" rx="2" fill="#0ea5e9"/>
  <text x="208" y="748" fill="#64748b" font-size="9">Shared memory</text>

  <!-- Flow numbers -->
  <circle cx="180" cy="492" r="10" fill="#22c55e" opacity="0.9"/>
  <text x="180" y="496" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">1</text>

  <circle cx="180" cy="594" r="10" fill="#3b82f6" opacity="0.9"/>
  <text x="180" y="598" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">2</text>

  <circle cx="350" cy="555" r="10" fill="#f97316" opacity="0.9"/>
  <text x="350" y="559" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">3</text>

  <circle cx="600" cy="555" r="10" fill="#a855f7" opacity="0.9"/>
  <text x="600" y="559" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">4</text>

  <circle cx="870" cy="540" r="10" fill="#f97316" opacity="0.9"/>
  <text x="870" y="544" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">5</text>

  <circle cx="870" cy="635" r="10" fill="#3b82f6" opacity="0.9"/>
